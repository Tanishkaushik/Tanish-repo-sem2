<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Virtual Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
    <script src="script.js"></script>
<body>
    <div class="interface-container">
        <h1>Lo-Fi Drum Pad</h1>
        <p class="subtitle">Click a pad or press the matching keyboard key</p>

        <div class="drum-grid">
            <div class="pad" data-key="a">
                <kbd>A</kbd>
                <span class="sound">Kick</span>
            </div>
            <div class="pad" data-key="s">
                <kbd>S</kbd>
                <span class="sound">Snare</span>
            </div>
            <div class="pad" data-key="d">
                <kbd>D</kbd>
                <span class="sound">Hi-Hat</span>
            </div>
            <div class="pad" data-key="f">
                <kbd>F</kbd>
                <span class="sound">Clap</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
